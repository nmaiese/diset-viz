{% if ENABLE_CONSENT_BANNER and (GA_MEASUREMENT_ID or ADSENSE_CLIENT) and not (ADSENSE_CLIENT and FORCE_FUNDING_CHOICES_CMP) %}
<style>
  .cookie-banner {
    position: fixed;
    z-index: 9999;
    right: 16px;
    bottom: 16px;
    left: 16px;
    display: flex;
    gap: 14px;
    align-items: center;
    justify-content: space-between;
    max-width: 760px;
    margin: 0 auto;
    padding: 14px 16px;
    color: #fbfaf7;
    background: #15233b;
    border: 1px solid rgba(251, 250, 247, 0.18);
    border-radius: 8px;
    box-shadow: 0 16px 40px rgba(21, 35, 59, 0.28);
    font: 14px/1.45 Inter, Arial, sans-serif;
  }
  .cookie-banner[hidden] { display: none; }
  .cookie-banner a { color: #fbfaf7; text-decoration: underline; }
  .cookie-actions { display: flex; gap: 8px; flex-shrink: 0; }
  .cookie-btn {
    border: 1px solid rgba(251, 250, 247, 0.35);
    border-radius: 6px;
    padding: 8px 12px;
    color: #fbfaf7;
    background: transparent;
    font: 700 13px/1 Inter, Arial, sans-serif;
    cursor: pointer;
  }
  .cookie-accept { border-color: #e4572e; background: #e4572e; }
  @media (max-width: 640px) {
    .cookie-banner { flex-direction: column; align-items: stretch; }
    .cookie-actions { justify-content: flex-end; }
  }
</style>
<div id="cookie-banner" class="cookie-banner" hidden>
  <div>
    Usiamo cookie facoltativi per statistiche e pubblicità. Puoi accettare o rifiutare, l'atlante funziona comunque.
    <a href="/privacy">Maggiori informazioni</a>.
  </div>
  <div class="cookie-actions">
    <button class="cookie-btn" type="button" onclick="diConsent(false)">Rifiuta</button>
    <button class="cookie-btn cookie-accept" type="button" onclick="diConsent(true)">Accetta</button>
  </div>
</div>
<script>
  (function () {
    var saved = null;
    try { saved = localStorage.getItem('di_consent'); } catch (e) {}
    if (!saved) {
      var banner = document.getElementById('cookie-banner');
      if (banner) banner.hidden = false;
    }
  })();
  function diConsent(accept) {
    try { localStorage.setItem('di_consent', accept ? 'granted' : 'denied'); } catch (e) {}
    if (typeof window.diApplyGoogleConsent === 'function') {
      window.diApplyGoogleConsent(accept ? 'granted' : 'denied');
    }
    var banner = document.getElementById('cookie-banner');
    if (banner) banner.hidden = true;
  }
</script>
{% endif %}
