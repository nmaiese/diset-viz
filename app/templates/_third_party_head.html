{% if GOOGLE_SITE_VERIFICATION %}
<meta name="google-site-verification" content="{{ GOOGLE_SITE_VERIFICATION }}">
{% endif %}
{% if BING_SITE_VERIFICATION %}
<meta name="msvalidate.01" content="{{ BING_SITE_VERIFICATION }}">
{% endif %}
{% if ADSENSE_CLIENT %}
<meta name="google-adsense-account" content="{{ ADSENSE_CLIENT }}">
{% endif %}

{% if GA_MEASUREMENT_ID or ADSENSE_CLIENT %}
<script>
  window.dataLayer = window.dataLayer || [];
  window.__diGoogleConsentUpdated = false;
  function gtag(){
    if (arguments[0] === 'consent' && arguments[1] === 'update') {
      window.__diGoogleConsentUpdated = true;
    }
    dataLayer.push(arguments);
  }
  window.diApplyGoogleConsent = function (state) {
    gtag('consent', 'update', {
      ad_storage: state,
      analytics_storage: state,
      ad_user_data: state,
      ad_personalization: state
    });
  };
  gtag('consent', 'default', {
    ad_storage: 'denied',
    analytics_storage: 'denied',
    ad_user_data: 'denied',
    ad_personalization: 'denied',
    wait_for_update: 500
  });
  try {
    var savedConsent = localStorage.getItem('di_consent');
    if (savedConsent === 'granted' || savedConsent === 'denied') {
      window.diApplyGoogleConsent(savedConsent);
    }
  } catch (e) {}
  window.setTimeout(function () {
    if (!window.__diGoogleConsentUpdated) {
      window.diApplyGoogleConsent('denied');
    }
  }, 900);
</script>
{% endif %}

{% if GA_MEASUREMENT_ID %}
<script async src="https://www.googletagmanager.com/gtag/js?id={{ GA_MEASUREMENT_ID }}"></script>
<script>
  gtag('js', new Date());
  gtag('config', '{{ GA_MEASUREMENT_ID }}', { anonymize_ip: true });
</script>
{% endif %}

{% if ADSENSE_CLIENT %}
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client={{ ADSENSE_CLIENT }}" crossorigin="anonymous"></script>
{% endif %}
